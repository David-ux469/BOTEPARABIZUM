<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Organiza vacas y serruchos en grupo. Los Bizums van al organizador desde tu app bancaria." />
  <meta name="theme-color" content="#1a0f2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bote" />
  <title>Bote para Bizum</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['"DM Sans"', 'system-ui', 'sans-serif'] } } } };</script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="text-white antialiased">

  <!-- Fondo global -->
  <div class="bg-fluid" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-orb bg-orb-4"></div>
  </div>

  <!-- LOGIN -->
  <div id="login-screen" aria-label="Iniciar sesión"></div>

  <!-- APP -->
  <div id="app-root" class="app-root">
    <div class="app-frame">
      <header class="webview-bar" role="banner">
        <button type="button" id="webview-back" class="webview-back" aria-label="Volver">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h1 id="webview-title" class="webview-title">Bote para Bizum</h1>
        <span class="webview-badge" id="webview-badge"><span class="webview-badge-dot"></span> v1.0</span>
      </header>

      <main class="app-main" id="app-main">
        <div class="app-shell"><div id="views"></div></div>
      </main>

      <nav class="bottom-nav-wrap" aria-label="Navegación">
        <div class="bottom-nav">
          <button type="button" class="nav-item is-active" data-nav="home" aria-label="Inicio">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span>Inicio</span>
          </button>
          <button type="button" class="nav-item" data-nav="botes" aria-label="Botes">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            <span>Botes</span>
          </button>
          <div class="nav-item nav-item-center">
            <button type="button" class="nav-fab" data-nav="create" aria-label="Crear bote">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            </button>
          </div>
          <button type="button" class="nav-item" data-nav="activity" aria-label="Actividad">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span>Actividad</span>
          </button>
          <button type="button" class="nav-item" data-nav="profile" aria-label="Perfil">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span>Perfil</span>
          </button>
        </div>
      </nav>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-panel liquid-card">
      <div class="modal-handle"></div>
      <div class="modal-inner">
        <div class="mb-4 flex items-center justify-between gap-3">
          <h2 id="modal-title" class="text-lg font-bold"></h2>
          <button type="button" id="modal-close" class="flex h-10 w-10 items-center justify-center rounded-xl bg-white/10" aria-label="Cerrar">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div id="modal-body"></div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/bizum-bridge.js"></script>
  <script src="js/render.js"></script>
  <script src="js/webapp.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
